<div class="p-4 md:p-6" style="min-height: 100vh; background: #f1f5f9">
  <!-- Page Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <p style="color: #64748b; font-size: 13px">User</p>
      <h1 style="color: #0f172a; font-size: 24px; font-weight: 700; margin: 2px 0 0">Settings</h1>
    </div>
  </div>
  <div class="grid grid-cols-1 gap-5 md:grid-cols-[2fr_6fr] md:gap-10">
    <div
      class="bg-white rounded-2xl p-5 md:h-80"
      style="box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9"
    >
      <ul
        style="
          list-style: none;
          margin: 0;
          padding: 0;
          display: flex;
          flex-direction: column;
          gap: 2px;
        "
      >
        @for (menu of subMenus; track menu.label) {
          <li>
            <div
              class="nav-link"
              [class.nav-active]="activeSubMenu === menu.label"
              (click)="handleSubmenu(menu)"
            >
              <app-icon [name]="menu.icon" [size]="18"></app-icon>
              <span>{{ menu.label }}</span>
            </div>
          </li>
        }
      </ul>
    </div>
    <div
      class="bg-white rounded-2xl p-5"
      style="box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9"
    >
      <ng-container [ngComponentOutlet]="activeCom"></ng-container>
    </div>
  </div>
</div>
