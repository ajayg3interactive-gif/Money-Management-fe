<div class="max-w-xl mx-auto">
  <!-- Avatar -->
  <div class="flex flex-col items-center gap-3 mb-8">
    <div class="relative" style="width: 140px; height: 140px">
      <div
        class="rounded-full overflow-hidden flex items-center justify-center"
        style="width: 140px; height: 140px; background-color: #a1a1a14b"
      >
        @if (avatarUrl()) {
          <img [src]="avatarUrl()" alt="Profile picture" class="w-full h-full object-cover" />
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="80"
            height="80"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#aaa9a9"
            stroke-width="1"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-user-round-icon lucide-user-round"
          >
            <circle cx="12" cy="8" r="5" />
            <path d="M20 21a8 8 0 0 0-16 0" />
          </svg>
        }
      </div>

      <button
        type="button"
        (click)="fileInput.click()"
        [disabled]="isUploadingAvatar()"
        class="absolute bottom-0 right-0 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 text-white rounded-full p-2 shadow-md transition-colors"
        aria-label="Change profile picture"
        title="Change profile picture"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
          />
        </svg>
      </button>

      @if (avatarUrl()) {
        <button
          type="button"
          (click)="removeAvatar()"
          [disabled]="isUploadingAvatar()"
          class="absolute bottom-0 left-0 bg-red-600 hover:bg-red-700 disabled:opacity-60 text-white rounded-full p-2 shadow-md transition-colors"
          aria-label="Remove profile picture"
          title="Remove profile picture"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3M4 7h16"
            />
          </svg>
        </button>
      }
    </div>

    <input
      #fileInput
      type="file"
      accept="image/png,image/jpeg,image/webp,image/gif"
      class="hidden"
      (change)="onFileSelected($event)"
    />
  </div>

  <!-- Form -->
  <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" novalidate>
    <!-- Full Name -->
    <div class="mb-5">
      <label class="block text-sm font-medium text-gray-700 mb-1.5" for="name">Full Name</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 text-gray-400"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
        </div>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="Your full name"
          [class]="fieldClass('name')"
        />
      </div>
      @if (name.touched && name.hasError('required')) {
        <p class="mt-1.5 text-xs text-red-600 flex items-center gap-1">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-3.5 w-3.5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          Full name is required.
        </p>
      }
    </div>

    <!-- Email -->
    <div class="mb-5">
      <label class="block text-sm font-medium text-gray-700 mb-1.5" for="email"
        >Email Address</label
      >
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 text-gray-400"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
            />
          </svg>
        </div>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class]="fieldClass('email')"
        />
      </div>
      @if (email.touched && email.hasError('required')) {
        <p class="mt-1.5 text-xs text-red-600 flex items-center gap-1">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-3.5 w-3.5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          Email is required.
        </p>
      }
      @if (email.touched && email.hasError('email')) {
        <p class="mt-1.5 text-xs text-red-600 flex items-center gap-1">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-3.5 w-3.5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          Please enter a valid email address.
        </p>
      }
    </div>

    <!-- Phone -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1.5" for="phone">Phone Number</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 text-gray-400"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
            />
          </svg>
        </div>
        <input
          id="phone"
          type="tel"
          formControlName="phone"
          placeholder="Optional"
          [class]="fieldClass('phone')"
        />
      </div>
    </div>

    <!-- Submit -->
    <button
      type="submit"
      [disabled]="isSubmitting()"
      class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold py-3 px-4 rounded-xl transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
    >
      @if (isSubmitting()) {
        <span class="flex items-center justify-center gap-2">
          <svg
            class="animate-spin h-4 w-4 text-white"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            />
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
            />
          </svg>
          Saving…
        </span>
      } @else {
        Save Changes
      }
    </button>
  </form>
</div>
