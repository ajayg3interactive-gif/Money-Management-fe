<!-- Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4"
     style="background:rgba(15,23,42,0.55);backdrop-filter:blur(4px)">

  <!-- Modal -->
  <div class="w-full bg-white rounded-2xl overflow-hidden" style="max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,0.18)">

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-5" style="border-bottom:1px solid #f1f5f9">
      <div>
        <h2 style="color:#0f172a;font-size:17px;font-weight:700;margin:0 0 3px">Add Transaction</h2>
        <p style="color:#94a3b8;font-size:12px;margin:0">Record a new income or expense</p>
      </div>
      <button
        (click)="closeModal()"
        class="flex items-center justify-center rounded-full transition-all"
        style="width:32px;height:32px;color:#94a3b8;background:transparent"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Type Toggle -->
    <div class="px-6 pt-5">
      <div class="flex gap-2 p-1 rounded-xl" style="background:#f1f5f9">
        <button class="flex-1 py-2 rounded-lg text-sm font-semibold text-white transition-all"
                style="background:linear-gradient(135deg,#EF4444 0%,#F87171 100%)">
          Expense
        </button>
        <button class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all"
                style="color:#64748b">
          Income
        </button>
      </div>
    </div>

    <!-- Form -->
    <div class="px-6 pt-5 pb-2" style="display:flex;flex-direction:column;gap:16px">

      <!-- Amount -->
      <div>
        <label style="display:block;font-size:11px;font-weight:600;color:#64748b;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:8px">
          Amount
        </label>
        <div class="flex items-center gap-2 rounded-xl px-4 py-3 transition-all"
             style="border:1.5px solid #e2e8f0;background:#f8fafc">
          <span style="color:#94a3b8;font-size:14px;font-weight:600;user-select:none">Rp</span>
          <input
            type="number"
            placeholder="0"
            class="no-spinner"
            style="flex:1;background:transparent;border:none;outline:none;font-size:22px;font-weight:700;color:#1e293b"
          />
        </div>
      </div>

      <!-- Category + Date -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label style="display:block;font-size:11px;font-weight:600;color:#64748b;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:8px">
            Category
          </label>
          <select style="width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:10px 12px;font-size:13.5px;color:#334155;background:#f8fafc;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none">
            <option value="" disabled selected>Select…</option>
            <option value="food">Food &amp; Dining</option>
            <option value="transport">Transport</option>
            <option value="shopping">Shopping</option>
            <option value="entertainment">Entertainment</option>
            <option value="bill">Bills/Rent</option>
            <option value="health">Health</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div>
          <label style="display:block;font-size:11px;font-weight:600;color:#64748b;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:8px">
            Date
          </label>
          <input
            type="date"
            style="width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:10px 12px;font-size:13.5px;color:#334155;background:#f8fafc;outline:none;cursor:pointer"
          />
        </div>
      </div>

      <!-- Description -->
      <div>
        <label style="display:block;font-size:11px;font-weight:600;color:#64748b;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:8px">
          Description
          <span style="font-weight:400;color:#cbd5e1;text-transform:none;letter-spacing:0">&nbsp;(optional)</span>
        </label>
        <textarea
          placeholder="What was this transaction for?"
          rows="3"
          style="width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px;font-size:13.5px;color:#334155;background:#f8fafc;outline:none;resize:none;font-family:inherit"
        ></textarea>
      </div>

    </div>

    <!-- Footer -->
    <div class="flex items-center gap-3 px-6 pb-6 pt-2">
      <button
        (click)="closeModal()"
        class="flex-1 py-3 rounded-xl text-sm font-semibold transition-all active:scale-95"
        style="border:1.5px solid #e2e8f0;color:#475569;background:white"
      >
        Cancel
      </button>
      <button
        class="flex-1 py-3 rounded-xl text-white text-sm font-semibold transition-all active:scale-95"
        style="background:linear-gradient(135deg,#5B6EF5 0%,#8B5CF6 100%);box-shadow:0 2px 8px rgba(91,110,245,0.35)"
      >
        Save Transaction
      </button>
    </div>

  </div>
</div>
