<app-toast></app-toast>

@if (isAuthRoute()) {
  <router-outlet></router-outlet>
} @else {
  <div class="flex overflow-hidden relative" style="height: 100vh; background: #F1F5F9">
    <app-side-bar [isOpen]="isSidebarOpen()" (closeMenu)="closeSidebar()"></app-side-bar>

    @if (isSidebarOpen()) {
      <div
        class="fixed inset-0 z-40 bg-black/50 md:hidden"
        (click)="closeSidebar()"
        aria-hidden="true"
      ></div>
    }

    <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
      <header class="flex items-center gap-3 px-4 shrink-0 border-b border-slate-200 bg-white md:hidden" style="height: 56px">
        <button
          type="button"
          (click)="toggleSidebar()"
          class="flex items-center justify-center shrink-0 rounded-lg text-slate-600 hover:bg-slate-100"
          style="width: 44px; height: 44px; margin-left: -8px"
          aria-label="Open menu"
          [attr.aria-expanded]="isSidebarOpen()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <p class="text-sm font-semibold text-slate-800">FinTrack</p>
      </header>
      <main class="flex-1 overflow-y-auto overflow-x-hidden" style="background: #F1F5F9">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
}
