<div style="position: relative">
  <button
    type="button"
    (click)="toggleOpen()"
    style="
      width: 100%;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13.5px;
      text-align: left;
      color: #334155;
      background: #f8fafc;
      outline: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    "
  >
    <span [style.color]="value ? '#334155' : '#94a3b8'">
      {{ value ? selectedLabel() : placeholder }}
    </span>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="#94a3b8"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polyline points="6 9 12 15 18 9" />
    </svg>
  </button>

  @if (open()) {
    <div
      (click)="closeDropdown()"
      style="position: fixed; inset: 0; z-index: 9"
    ></div>
    <div
      style="
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        z-index: 10;
        background: white;
        border: 1.5px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
        max-height: 220px;
        overflow-y: auto;
      "
    >
      @for (cat of categories; track cat.value) {
        <div
          (click)="selectCategory(cat)"
          class="category-dropdown-option"
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            font-size: 13.5px;
            color: #334155;
            cursor: pointer;
          "
        >
          <span>{{ cat.label }}</span>
          @if (showEditIcon && isEditable(cat.value)) {
            <button
              type="button"
              (click)="onEditClick($event, cat.value)"
              title="Edit"
              style="
                display: flex;
                align-items: center;
                justify-content: center;
                width: 24px;
                height: 24px;
                border-radius: 6px;
                border: none;
                background: transparent;
                color: #5b6ef5;
                cursor: pointer;
              "
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
              </svg>
            </button>
          }
        </div>
      }
    </div>
  }
</div>
